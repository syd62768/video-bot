name: Telegram Video Downloader Architecture

on:
  repository_dispatch:
    types: [start_video_download]

jobs:
  process-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.zip
          pip install requests
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Python Downloader Engine
        env:
          # دریافت خودکار توکن از کلودفلر (بدون نیاز به تنظیم دستی)
          TG_TOKEN: ${{ github.event.client_payload.bot_token }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          URL: ${{ github.event.client_payload.url }}
          REPLY_TO: ${{ github.event.client_payload.reply_to }}
          WAIT_MSG_ID: ${{ github.event.client_payload.wait_msg_id }}
          ACTION: ${{ github.event.client_payload.action }}
          QUALITY: ${{ github.event.client_payload.quality }}
          # کوکی ها همچنان از سکرت خوانده می شوند
          YT_COOKIE_1: ${{ secrets.YT_COOKIE_1 }}
          YT_COOKIE_2: ${{ secrets.YT_COOKIE_2 }}
          YT_COOKIE_3: ${{ secrets.YT_COOKIE_3 }}
          YT_COOKIE_4: ${{ secrets.YT_COOKIE_4 }}
        run: python downloader.py

