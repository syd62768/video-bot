
name: Telegram Video Downloader Pro Engine

on:
  repository_dispatch:
    types: [start_video_download]

jobs:
  process-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xray Proxy (Bypass IP Block)
        run: |
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-linux-64.zip
          unzip -q xray.zip
          cat << 'EOF' > config.json
          {
            "inbounds": [{"port": 10809, "listen": "127.0.0.1", "protocol": "http"}],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": "areflover.boobs85.lol",
                  "port": 8443,
                  "users": [{"id": "2d01bcf1-7509-4200-8ad2-4253b44c6c2d", "encryption": "none"}]
                }]
              },
              "streamSettings": {
                "network": "xhttp",
                "security": "reality",
                "realitySettings": {
                  "serverName": "semiconductor.samsung.com",
                  "publicKey": "J2uJsqj8-7Sgs5yS8--TgSAa-ueFQ8q-ZjWXRfR_33Q",
                  "shortId": "cddc",
                  "spiderX": "/26HbjVBSPf2mWyg"
                },
                "xhttpSettings": {"path": "/lol", "mode": "auto"}
              }
            }]
          }
          EOF
          ./xray -c config.json &
          sleep 3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies & FFmpeg
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp requests
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Python Engine
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          URL: ${{ github.event.client_payload.url }}
          REPLY_TO: ${{ github.event.client_payload.reply_to }}
          WAIT_MSG_ID: ${{ github.event.client_payload.wait_msg_id }}
          ACTION_TYPE: ${{ github.event.client_payload.action_type }}
          QUALITY: ${{ github.event.client_payload.quality }}
          # اعمال پروکسی محلی روی پایتون
          HTTP_PROXY: "http://127.0.0.1:10809"
          HTTPS_PROXY: "http://127.0.0.1:10809"
        run: python downloader.py

